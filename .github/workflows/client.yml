name: Client CI/CD
on:
  push:
    branches: 
      - main
  pull_request:
    branches: 
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v3

      - name: Setup node js
        uses: actions/setup-node@v3
        with: 
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Install dependencies
        run: cd client && npm ci

      - name: Build
        run: cd client && npm run build

